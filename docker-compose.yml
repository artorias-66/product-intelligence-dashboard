version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: product_intel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: product_intel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product_intel_backend
    environment:
      # Use local Postgres when running in Docker
      - DATABASE_URL=postgresql://postgres:password@db:5432/product_intel
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product_intel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
